<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX DEVELOPING LABS | لوحة الإدارة</title>
  <link rel="stylesheet" href="./src/styles.css">
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
      background: var(--surface-primary);
    }
    
    .admin-sidebar {
      background: var(--color-navy-900);
      color: var(--text-on-dark);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
      border-left: var(--border-thin) solid var(--color-navy-800);
    }
    
    .admin-main {
      padding: var(--space-8);
      overflow-y: auto;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-8);
      padding-bottom: var(--space-4);
      border-bottom: var(--border-thin) solid var(--border-subtle);
    }
    
    .request-card {
      background: var(--surface-elevated);
      border: var(--border-thin) solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-sm);
    }
    
    .request-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-4);
      border-bottom: var(--border-thin) solid var(--border-default);
    }
    
    .request-card__title {
      font-size: var(--fs-xl);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
    }
    
    .request-card__meta {
      font-size: var(--fs-sm);
      color: var(--text-tertiary);
      margin-top: var(--space-1);
    }
    
    .request-badge {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      background: var(--color-navy-100);
      color: var(--color-navy-700);
    }
    
    .request-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--space-6);
      margin-bottom: var(--space-6);
    }
    
    .data-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }
    
    .data-label {
      font-size: var(--fs-xs);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: var(--ls-wider);
    }
    
    .data-value {
      font-size: var(--fs-sm);
      color: var(--text-primary);
      font-weight: var(--fw-medium);
    }
    
    .data-full {
      grid-column: 1 / -1;
      background: var(--surface-secondary);
      padding: var(--space-4);
      border-radius: var(--radius-md);
    }
    
    .actions-bar {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-4);
    }
    
    .empty-state {
      text-align: center;
      padding: var(--space-12);
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div>
        <h2 class="heading-4" style="color: var(--color-white);">APEX LABS</h2>
        <p class="body-sm text-on-dark-secondary" style="color: var(--color-slate-400);">لوحة التحكم والمراجعات</p>
      </div>
      
      <nav>
        <ul style="display: flex; flex-direction: column; gap: var(--space-4);">
          <li>
            <a href="#" style="color: var(--color-navy-300); font-weight: var(--fw-medium);">طلبات المراجعة الاستراتيجية</a>
          </li>
          <li>
            <a href="index.html" style="color: var(--color-slate-400); font-weight: var(--fw-medium);">العودة للموقع ←</a>
          </li>
        </ul>
      </nav>
    </aside>
    
    <main class="admin-main">
      <div class="admin-header">
        <h1 class="heading-2">الطلبات الواردة</h1>
        <button class="btn btn--sm btn--ghost" onclick="clearRequests()">مسح كل الطلبات</button>
      </div>
      
      <div id="requestsContainer">
        <!-- Requests will be loaded here via JS -->
      </div>
    </main>
  </div>

  <script src="./src/admin.js"></script>
</body>
</html>
